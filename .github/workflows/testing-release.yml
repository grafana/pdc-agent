name: testing-release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit to build from'
        required: true
permissions:
  id-token: write
  contents: read

jobs:
  testing-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.ref }}
      - run: git fetch --force --tags
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: "1.26.4"
          cache: false
      - name: Login to GAR
        uses: grafana/shared-workflows/actions/login-to-gar@c7ad5f57693ac858c698d95783685a9cbfd91223 # login-to-gar/v1.0.1
        with:
          registry: us-docker.pkg.dev
      - name: Build and push snapshot Docker image
        run: |
          TAG="$(git rev-parse --short HEAD)"
          NAME="us-docker.pkg.dev/grafanalabs-global/dockerhub-pdc-agent-prod-mirror/pdc-agent:testing-${TAG}"
          CGO_ENABLED=0 make build
          cp pdc cmd/pdc/pdc
          docker build -t "${NAME}" cmd/pdc/
          docker push "${NAME}"
          echo "Pushed ${NAME}"
